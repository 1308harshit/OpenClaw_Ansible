---
- name: Start Nginx Service
  hosts: localhost_linux
  gather_facts: false
  become: yes
  connection: local

  vars:
    ansible_connection: local
    ansible_network_os: ""
    ansible_become_method: sudo

  tasks:
    - name: Start Nginx service
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: yes
      register: nginx_start

    - name: Wait for Nginx to be ready
      ansible.builtin.wait_for:
        port: 443
        delay: 2
        timeout: 10

    - name: Display status
      ansible.builtin.debug:
        msg:
          - "[OK] Nginx service started successfully!"
          - "HTTPS is now active on port 443"
          - "Access: https://snoopy.timlam007.com"
