---
- name: Install and Configure HashiCorp Vault with PKI Engine
  hosts: localhost_linux
  gather_facts: true
  become: yes
  connection: local

  vars:
    ansible_connection: local
    ansible_network_os: ""
    ansible_become_method: sudo
    vault_version: "1.15.4"
    vault_download_url: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_linux_amd64.zip"
    vault_install_dir: "/usr/local/bin"
    vault_data_dir: "/opt/vault/data"
    vault_config_dir: "/etc/vault.d"
    vault_service_user: "vault"
    root_ca_common_name: "snoopy.timlam007.com Root CA"
    pki_max_lease_ttl: "87600h"  # 10 years
    cert_max_ttl: "720h"  # 30 days

  tasks:
    - name: Check if Vault is already installed
      ansible.builtin.stat:
        path: "{{ vault_install_dir }}/vault"
      register: vault_binary

    - name: Install required packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - unzip
          - curl
          - jq
        state: present
        update_cache: yes
      when: ansible_facts.os_family == "Debian" and not vault_binary.stat.exists

    - name: Install required packages (RHEL/AlmaLinux)
      ansible.builtin.dnf:
        name:
          - unzip
          - curl
          - jq
        state: present
      when: ansible_facts.os_family == "RedHat" and not vault_binary.stat.exists

    - name: Download HashiCorp Vault
      ansible.builtin.get_url:
        url: "{{ vault_download_url }}"
        dest: "/tmp/vault.zip"
        mode: '0644'
      when: not vault_binary.stat.exists

    - name: Unzip Vault binary
      ansible.builtin.unarchive:
        src: "/tmp/vault.zip"
        dest: "{{ vault_install_dir }}"
        remote_src: yes
        mode: '0755'
      when: not vault_binary.stat.exists

    - name: Create Vault system user
      ansible.builtin.user:
        name: "{{ vault_service_user }}"
        system: yes
        create_home: no
        shell: /bin/false
      when: not vault_binary.stat.exists

    - name: Create Vault directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ vault_service_user }}"
        group: "{{ vault_service_user }}"
        mode: '0750'
      loop:
        - "{{ vault_config_dir }}"
        - "{{ vault_data_dir }}"

    - name: Create Vault configuration file (dev mode for demo)
      ansible.builtin.copy:
        content: |
          ui = true
          disable_mlock = true
          
          storage "file" {
            path = "{{ vault_data_dir }}"
          }
          
          listener "tcp" {
          address     = "0.0.0.0:8200"
          tls_disable = 1
          }

          api_addr = "http://100.30.182.96:8200"
        dest: "{{ vault_config_dir }}/vault.hcl"
        owner: "{{ vault_service_user }}"
        group: "{{ vault_service_user }}"
        mode: '0640'

    - name: Create Vault systemd service file
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=HashiCorp Vault
          Documentation=https://www.vaultproject.io/docs/
          Requires=network-online.target
          After=network-online.target
          
          [Service]
          User={{ vault_service_user }}
          Group={{ vault_service_user }}
          ExecStart={{ vault_install_dir }}/vault server -config={{ vault_config_dir }}/vault.hcl
          ExecReload=/bin/kill --signal HUP $MAINPID
          KillMode=process
          Restart=on-failure
          LimitNOFILE=65536
          
          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/vault.service
        mode: '0644'

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Start and enable Vault service
      ansible.builtin.systemd:
        name: vault
        state: started
        enabled: yes

    - name: Wait for Vault to be ready
      ansible.builtin.wait_for:
        port: 8200
        delay: 5
        timeout: 30

    - name: Set VAULT_ADDR environment variable for initialization
      ansible.builtin.set_fact:
        vault_addr: "http://127.0.0.1:8200"

    - name: Check if Vault is already initialized
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/health"
        method: GET
        status_code: [200, 429, 473, 501, 503]
        return_content: yes
      register: vault_health
      environment:
        VAULT_ADDR: "{{ vault_addr }}"

    - name: Initialize Vault (if not already initialized)
      ansible.builtin.shell: |
        {{ vault_install_dir }}/vault operator init -key-shares=1 -key-threshold=1 -format=json
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
      register: vault_init_output
      when: vault_health.json.initialized is defined and not vault_health.json.initialized

    - name: Save Vault unseal key and root token
      ansible.builtin.copy:
        content: "{{ vault_init_output.stdout }}"
        dest: "/root/.vault_init.json"
        mode: '0600'
      when: vault_init_output.changed

    - name: Read Vault init data
      ansible.builtin.slurp:
        src: "/root/.vault_init.json"
      register: vault_init_data
      when: vault_init_output.changed

    - name: Parse Vault init data
      ansible.builtin.set_fact:
        vault_unseal_key: "{{ (vault_init_data.content | b64decode | from_json).unseal_keys_b64[0] }}"
        vault_root_token: "{{ (vault_init_data.content | b64decode | from_json).root_token }}"
      when: vault_init_output.changed

    - name: Unseal Vault
      ansible.builtin.shell: |
        {{ vault_install_dir }}/vault operator unseal {{ vault_unseal_key }}
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
      when: vault_init_output.changed

    - name: Read existing Vault credentials if not just initialized
      ansible.builtin.slurp:
        src: "/root/.vault_init.json"
      register: existing_vault_data
      when: not vault_init_output.changed
      ignore_errors: yes

    - name: Set Vault credentials from existing file
      ansible.builtin.set_fact:
        vault_root_token: "{{ (existing_vault_data.content | b64decode | from_json).root_token }}"
      when: not vault_init_output.changed and existing_vault_data is defined

    - name: Enable PKI secrets engine
      ansible.builtin.shell: |
        {{ vault_install_dir }}/vault secrets enable -path=pki pki || true
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_root_token }}"

    - name: Tune PKI secrets engine max lease TTL
      ansible.builtin.shell: |
        {{ vault_install_dir }}/vault secrets tune -max-lease-ttl={{ pki_max_lease_ttl }} pki
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_root_token }}"

    - name: Check if Root CA already exists (avoid changing the CA on reruns)
      ansible.builtin.shell: |
        set -euo pipefail
        {{ vault_install_dir }}/vault read -field=certificate pki/cert/ca >/dev/null 2>&1 && echo "exists" || echo "missing"
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_root_token }}"
      register: root_ca_state
      changed_when: false

    - name: Generate Root CA certificate (first run only)
      ansible.builtin.shell: |
        {{ vault_install_dir }}/vault write -field=certificate pki/root/generate/internal \
          common_name="{{ root_ca_common_name }}" \
          ttl={{ pki_max_lease_ttl }} \
          > /opt/vault/root_ca.crt
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_root_token }}"
      when: root_ca_state.stdout.strip() != "exists"

    - name: Export existing Root CA certificate to file (reruns)
      ansible.builtin.shell: |
        {{ vault_install_dir }}/vault read -field=certificate pki/cert/ca > /opt/vault/root_ca.crt
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_root_token }}"
      when: root_ca_state.stdout.strip() == "exists"

    - name: Configure PKI certificate issuing and CRL URLs
      ansible.builtin.shell: |
        {{ vault_install_dir }}/vault write pki/config/urls \
          issuing_certificates="{{ vault_addr }}/v1/pki/ca" \
          crl_distribution_points="{{ vault_addr }}/v1/pki/crl"
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_root_token }}"

    - name: Create PKI role for snoopy.timlam007.com
      ansible.builtin.shell: |
        {{ vault_install_dir }}/vault write pki/roles/web-server \
          allowed_domains="snoopy.timlam007.com" \
          allow_subdomains=true \
          allow_bare_domains=true \
          max_ttl="{{ cert_max_ttl }}"
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_root_token }}"

    - name: Request initial SSL certificate from Vault
      ansible.builtin.shell: |
        {{ vault_install_dir }}/vault write -format=json pki/issue/web-server \
          common_name="snoopy.timlam007.com" \
          ttl="{{ cert_max_ttl }}"
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_root_token }}"
      register: initial_cert_output

    - name: Create SSL certificate directory
      ansible.builtin.file:
        path: /etc/nginx/ssl
        state: directory
        mode: '0750'

    - name: Save initial certificate
      ansible.builtin.copy:
        content: "{{ (initial_cert_output.stdout | from_json).data.certificate }}"
        dest: /etc/nginx/ssl/server.crt
        mode: '0644'

    - name: Save initial private key
      ansible.builtin.copy:
        content: "{{ (initial_cert_output.stdout | from_json).data.private_key }}"
        dest: /etc/nginx/ssl/server.key
        mode: '0600'

    - name: Save CA certificate
      ansible.builtin.copy:
        content: "{{ (initial_cert_output.stdout | from_json).data.issuing_ca }}"
        dest: /etc/nginx/ssl/ca.crt
        mode: '0644'

    - name: Build full chain certificate for Nginx (server + issuing CA)
      ansible.builtin.shell: |
        set -euo pipefail
        { cat /etc/nginx/ssl/server.crt; echo; cat /etc/nginx/ssl/ca.crt; echo; } > /etc/nginx/ssl/fullchain.crt
        chmod 0644 /etc/nginx/ssl/fullchain.crt
      changed_when: false

    - name: Generate pre-expired certificate for demo purposes
      ansible.builtin.shell: |
        openssl req -x509 -newkey rsa:2048 -nodes \
          -keyout /etc/nginx/ssl/expired_demo_cert.key \
          -out /etc/nginx/ssl/expired_demo_cert.crt \
          -days -365 \
          -subj "/C=US/ST=Demo/O=Expired/CN=snoopy.timlam007.com" \
          2>/dev/null || \
        (openssl req -x509 -newkey rsa:2048 -nodes \
          -keyout /etc/nginx/ssl/expired_demo_cert.key \
          -out /etc/nginx/ssl/expired_demo_cert.crt \
          -days 1 \
          -subj "/C=US/ST=Demo/O=Expired/CN=snoopy.timlam007.com" && \
         touch -t 202001010000 /etc/nginx/ssl/expired_demo_cert.crt)
      args:
        creates: /etc/nginx/ssl/expired_demo_cert.crt

    - name: Display Vault status
      ansible.builtin.debug:
        msg:
          - "[SUCCESS] HashiCorp Vault installed and configured successfully!"
          - "Vault Address: {{ vault_addr }}"
          - "Root CA: /opt/vault/root_ca.crt"
          - "Initial SSL Certificate: /etc/nginx/ssl/server.crt"
          - "Root Token saved at: /root/.vault_init.json"
          - "PKI engine enabled with role: web-server"
          