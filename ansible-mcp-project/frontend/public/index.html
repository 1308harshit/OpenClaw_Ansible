<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ansible MCP Buddy</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app-wrapper {
      display: flex;
      min-height: 100vh;
      padding: 40px 20px;
      gap: 20px;
      transition: padding-right 0.3s ease;
    }

    .app-wrapper.debug-open {
      padding-right: 0;
    }

    .container {
      flex: 1;
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 32px 36px;
      transition: max-width 0.3s ease;
    }

    .app-wrapper.debug-open .container {
      max-width: 100%;
      margin-right: 0;
    }

    /* ══════════════════════════════════════════════════════
       DESKTOP (≥769px)
       Two-column flex: [left-col] [right-col]
       right-col = time stacked above robot, right-aligned
    ══════════════════════════════════════════════════════ */
    .layout {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
    }

    .left-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .right-col {
      flex-shrink: 0;
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.2;
    }

    .model-info {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .model-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #f0f0f0;
      border: 1px solid #e0e0e0;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      color: #555;
      white-space: nowrap;
    }

    .model-badge strong {
      color: #667eea;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 14px;
      border: 1.5px solid #d0d0d0;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: #444;
      resize: vertical;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    .btn:hover {
      filter: brightness(1.1);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-send {
      background: #667eea;
      color: #fff;
    }

    .btn-clear {
      background: #dc3545;
      color: #fff;
    }

    .btn-history {
      background: #764ba2;
      color: #fff;
    }

    .btn-debug {
      background: #2d3748;
      color: #fff;
      position: relative;
    }

    .btn-debug .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #dc3545;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    .datetime-display {
      text-align: right;
      line-height: 1.4;
    }

    .datetime-display .time {
      display: block;
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    .datetime-display .date {
      display: block;
      font-size: 12px;
      color: #888;
    }

    .robo-img {
      width: 170px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(102, 126, 234, 0.25));
      transition: width 0.3s ease;
    }

    .result-label {
      margin: 0 0 10px 0;
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
    }

    pre#out {
      margin: 0;
      background: #1a1a1a;
      color: #d4d4d4;
      padding: 18px 20px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.65;
      min-height: 90px;
      max-height: 480px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    /* ══════════════════════════════════════════════════════
       DEBUG PANEL STYLES
    ══════════════════════════════════════════════════════ */
    .debug-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 500px;
      height: 100vh;
      background: #0d1117;
      box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .debug-panel.open {
      transform: translateX(0);
    }

    .debug-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }

    .debug-header h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #58a6ff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .debug-close {
      background: transparent;
      border: none;
      color: #8b949e;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
    }

    .debug-close:hover {
      background: #21262d;
      color: #c9d1d9;
    }

    .debug-controls {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-wrap: wrap;
    }

    .debug-filter {
      flex: 1;
      min-width: 120px;
      padding: 6px 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 13px;
      cursor: pointer;
    }

    .debug-search {
      flex: 2;
      min-width: 150px;
      padding: 6px 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 13px;
    }

    .debug-search:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .debug-btn-small {
      padding: 6px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .debug-btn-small:hover {
      background: #30363d;
    }

    .debug-logs {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .debug-entry {
      margin-bottom: 8px;
      padding: 8px 12px;
      background: #161b22;
      border-left: 3px solid #30363d;
      border-radius: 4px;
      word-wrap: break-word;
    }

    .debug-entry.system { border-left-color: #58a6ff; }
    .debug-entry.tool { border-left-color: #3fb950; }
    .debug-entry.ai { border-left-color: #d29922; }
    .debug-entry.error { border-left-color: #f85149; }
    .debug-entry.timing { border-left-color: #bc8cff; }

    .debug-timestamp {
      color: #8b949e;
      font-size: 11px;
      margin-right: 8px;
    }

    .debug-type {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      margin-right: 8px;
      text-transform: uppercase;
    }

    .debug-type.system { background: #1f6feb; color: #fff; }
    .debug-type.tool { background: #238636; color: #fff; }
    .debug-type.ai { background: #9e6a03; color: #fff; }
    .debug-type.error { background: #da3633; color: #fff; }
    .debug-type.timing { background: #8957e5; color: #fff; }

    .debug-message {
      color: #c9d1d9;
      white-space: pre-wrap;
    }

    .debug-stats {
      padding: 8px 20px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: #8b949e;
    }

    .debug-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .debug-stat-value {
      color: #58a6ff;
      font-weight: 600;
    }

    /* ══════════════════════════════════════════════════════
       TABLET  769px – 1024px
       Side-by-side preserved, just scaled down
    ══════════════════════════════════════════════════════ */
    @media (max-width: 1024px) {
      .app-wrapper {
        padding: 24px 16px;
      }

      .container {
        padding: 28px 24px;
      }

      .right-col {
        width: 140px;
      }

      .robo-img {
        width: 130px;
      }

      h1 {
        font-size: 24px;
      }

      .datetime-display .time {
        font-size: 16px;
      }

      .debug-panel {
        width: 400px;
      }
    }

    /* ══════════════════════════════════════════════════════
       MOBILE  ≤768px
       
       The layout switches to a CSS Grid with named areas:
       
         "title  robot"   ← h1 left, robot right — same row
         "badges badges"
         "input  input"
         "btns   btns"
       
       This is the cleanest way to keep robot beside the title
       without any order tricks or duplicate DOM nodes.
    ══════════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .app-wrapper {
        padding: 14px 12px;
      }

      .container {
        padding: 20px 16px;
        border-radius: 12px;
      }

      .debug-panel {
        width: 100%;
      }

      .debug-controls {
        flex-direction: column;
      }

      .debug-filter,
      .debug-search {
        width: 100%;
      }

      /* Switch outer layout to grid */
      .layout {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto auto auto;
        grid-template-areas:
          "title  robot"
          "badges badges"
          "input  input"
          "btns   btns";
        gap: 12px;
        margin-bottom: 16px;
      }

      /* left-col becomes a grid subgrid — pass its children to areas */
      .left-col {
        display: contents;
        /* children participate directly in parent grid */
      }

      /* Assign each child to its grid area */
      .left-col>h1 {
        grid-area: title;
        align-self: center;
      }

      .left-col>.model-info {
        grid-area: badges;
      }

      .left-col>textarea {
        grid-area: input;
      }

      .left-col>.btn-row {
        grid-area: btns;
      }

      /* right-col sits in the robot area, top-right */
      .right-col {
        grid-area: robot;
        width: auto;
        align-items: flex-end;
        gap: 4px;
      }

      /*
       * Fluid robot: scales smoothly from 360px to 768px
       * 360px → clamp floor  = 68px
       * 500px → 20vw         = 100px
       * 768px → clamp ceiling = 120px
       */
      .robo-img {
        width: clamp(68px, 20vw, 120px);
      }

      .datetime-display {
        text-align: right;
      }

      .datetime-display .time {
        font-size: clamp(12px, 3.5vw, 16px);
      }

      .datetime-display .date {
        font-size: clamp(10px, 2.4vw, 12px);
      }

      h1 {
        font-size: clamp(16px, 5vw, 22px);
        margin: 0;
      }

      .model-badge {
        font-size: clamp(11px, 2.8vw, 13px);
        padding: clamp(3px, 0.8vw, 5px) clamp(8px, 2.5vw, 12px);
      }

      textarea {
        height: clamp(86px, 22vw, 112px);
        font-size: clamp(13px, 3.4vw, 15px);
      }

      /* Buttons: flex-wrap at 480–768px */
      .btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .btn {
        padding: clamp(8px, 2vw, 10px) clamp(14px, 4.5vw, 22px);
        font-size: clamp(13px, 3.4vw, 15px);
      }

      pre#out {
        font-size: clamp(12px, 3vw, 13.5px);
        max-height: clamp(180px, 40vw, 300px);
      }

      .result-label {
        font-size: clamp(15px, 4vw, 18px);
      }
    }

    /* ══════════════════════════════════════════════════════
       SMALL MOBILE  ≤480px
       Buttons switch to 2-col grid
    ══════════════════════════════════════════════════════ */
    @media (max-width: 480px) {
      .app-wrapper {
        padding: 12px 10px;
      }

      .container {
        padding: 16px 14px;
        border-radius: 10px;
      }

      .btn-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
      }

      .btn-history {
        grid-column: 1 / -1;
      }

      pre#out {
        padding: 14px;
      }

      .debug-panel {
        width: 100%;
      }
    }

    /* Scrollbar styling for debug panel */
    .debug-logs::-webkit-scrollbar {
      width: 8px;
    }

    .debug-logs::-webkit-scrollbar-track {
      background: #0d1117;
    }

    .debug-logs::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 4px;
    }

    .debug-logs::-webkit-scrollbar-thumb:hover {
      background: #484f58;
    }
  </style>
</head>

<body>
  <div class="app-wrapper">
    <div class="container">

    <!--
      .layout:
        Desktop → flex row: [.left-col] [.right-col]
        Mobile  → CSS grid with named areas, robot stays
                  right of the title at every width
    -->
    <div class="layout">

      <div class="left-col">
        <h1>Ansible MCP Buddy</h1>

        <div class="model-info">
          <div class="model-badge">Provider: <strong id="gemini-provider">Loading…</strong></div>
          <div class="model-badge">Model: <strong id="gemini-model">Loading…</strong></div>
          <div class="model-badge">Users: <strong id="active-users">0</strong></div>
        </div>

        <textarea id="q" placeholder="e.g. List playbooks, then run show_interfaces_all.yml in check mode"
          aria-label="Query input"></textarea>

        <div class="btn-row">
          <button id="go" class="btn btn-send" aria-label="Send query">Send</button>
          <button id="clear-btn" class="btn btn-clear" aria-label="Clear input">Clear</button>
          <button id="history-btn" class="btn btn-history" aria-label="View history">View History</button>
          <button id="debug-btn" class="btn btn-debug" aria-label="Toggle debug panel">
            🔍 Debug
            <span class="badge" id="debug-badge" style="display: none;">0</span>
          </button>
        </div>
      </div>

      <!-- Time + robot: right column on desktop, grid-area "robot" on mobile -->
      <div class="right-col">
        <div class="datetime-display">
          <span class="time" id="hkt-time">--:--:--</span>
          <span class="date" id="hkt-date">Loading…</span>
        </div>
        <img src="Robo.gif" alt="Robo mascot" class="robo-img" />
      </div>

    </div>

    <div class="result-label">Result</div>
    <pre id="out" aria-live="polite" aria-label="Query result">(waiting)</pre>

    </div>
  </div>

  <!-- Enhanced Debug Panel (slides in from right) -->
  <aside class="debug-panel" id="debug-panel">
    <div class="debug-header">
      <h3>🔍 Debug Console</h3>
      <button class="debug-close" id="debug-close" aria-label="Close debug panel">×</button>
    </div>
    
    <div class="debug-controls">
      <select class="debug-filter" id="debug-filter" aria-label="Filter debug logs">
        <option value="all">All Events</option>
        <option value="system">System</option>
        <option value="tool">Tools</option>
        <option value="ai">AI</option>
        <option value="error">Errors</option>
        <option value="timing">Timing</option>
      </select>
      
      <input type="text" class="debug-search" id="debug-search" placeholder="Search logs..." aria-label="Search debug logs">
      
      <button class="debug-btn-small" id="debug-clear">Clear</button>
      <button class="debug-btn-small" id="debug-export">Export</button>
    </div>
    
    <div class="debug-logs" id="debug-logs">
      <div style="color: #8b949e; text-align: center; padding: 40px 20px;">
        No debug events yet. Send a query to see logs.
      </div>
    </div>
    
    <div class="debug-stats">
      <div class="debug-stat">
        <span>Total:</span>
        <span class="debug-stat-value" id="debug-total">0</span>
      </div>
      <div class="debug-stat">
        <span>Tools:</span>
        <span class="debug-stat-value" id="debug-tools">0</span>
      </div>
      <div class="debug-stat">
        <span>Errors:</span>
        <span class="debug-stat-value" id="debug-errors">0</span>
      </div>
      <div class="debug-stat">
        <span>Duration:</span>
        <span class="debug-stat-value" id="debug-duration">0s</span>
      </div>
    </div>
  </aside>

  <script src="app.js?v=3.0"></script>
</body>

</html>
