<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Query History - Ansible MCP Buddy</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 40px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        padding: 40px;
      }
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0;
        color: #333;
        font-size: 32px;
        font-weight: 600;
      }
      .back-btn {
        padding: 10px 24px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
        text-decoration: none;
        display: inline-block;
      }
      .back-btn:hover {
        background: #5568d3;
      }
      .filters {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
        align-items: center;
      }
      .filters input {
        flex: 1;
        padding: 10px 14px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
      }
      .filters button {
        padding: 10px 20px;
        background: #764ba2;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }
      .filters button:hover {
        background: #5d3a82;
      }
      #delete-all-btn {
        background: #dc3545;
      }
      #delete-all-btn:hover {
        background: #c82333;
      }
      .history-list {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .history-item {
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        padding: 20px;
        transition: border-color 0.2s;
      }
      .history-item:hover {
        border-color: #667eea;
      }
      .history-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid #e0e0e0;
      }
      .timestamp {
        font-size: 13px;
        color: #888;
      }
      .query-section {
        margin-bottom: 16px;
      }
      .query-label {
        font-size: 12px;
        font-weight: 600;
        color: #667eea;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .query-text {
        background: #f5f5f5;
        padding: 12px;
        border-radius: 6px;
        font-size: 14px;
        color: #333;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      .response-section {
        margin-top: 16px;
      }
      .response-label {
        font-size: 12px;
        font-weight: 600;
        color: #764ba2;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .response-text {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 16px;
        border-radius: 6px;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-wrap: break-word;
        max-height: 400px;
        overflow-y: auto;
      }
      .no-history {
        text-align: center;
        padding: 60px 20px;
        color: #888;
      }
      .loading {
        text-align: center;
        padding: 60px 20px;
        color: #667eea;
        font-size: 16px;
      }
      .stats {
        display: flex;
        gap: 20px;
        margin-bottom: 24px;
        padding: 16px;
        background: #f5f5f5;
        border-radius: 8px;
      }
      .stat-item {
        flex: 1;
        text-align: center;
      }
      .stat-value {
        font-size: 24px;
        font-weight: 600;
        color: #667eea;
      }
      .stat-label {
        font-size: 12px;
        color: #888;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-row">
        <h1>Query History</h1>
        <a href="/" class="back-btn">← Back to MCP Buddy</a>
      </div>

      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="total-queries">0</div>
          <div class="stat-label">Total Queries</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="today-queries">0</div>
          <div class="stat-label">Today</div>
        </div>
      </div>

      <div class="filters">
        <input type="text" id="search-input" placeholder="Search queries..." />
        <button id="search-btn">Search</button>
        <button id="clear-btn">Clear</button>
        <button id="delete-all-btn" style="background: #dc3545; margin-left: auto;">Delete All History</button>
      </div>

      <div id="history-container">
        <div class="loading">Loading history...</div>
      </div>
    </div>

    <script src="history.js"></script>
  </body>
</html>
