<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Query History – Ansible MCP Buddy</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      /* Mobile: minimal padding */
      padding: 16px 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    /* ─── Container ─────────────────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      /* Mobile: tighter padding */
      padding: 20px 16px;
    }

    /* ─── Page header ───────────────────────────────────────────── */
    /* Mobile: stacked */
    .page-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      color: #333;
      font-size: 22px;
      font-weight: 700;
    }

    .back-btn {
      display: inline-block;
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
      align-self: flex-start;
    }

    .back-btn:hover {
      background: #5568d3;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    /* ─── Stats ─────────────────────────────────────────────────── */
    .stats {
      display: grid;
      /* Mobile: 2 equal columns */
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
      padding: 14px;
      background: #f5f5f5;
      border-radius: 8px;
    }

    .stat-item {
      text-align: center;
    }

    /* Chart container spans full width on mobile */
    .stat-item:has(#analytics-chart) {
      grid-column: 1 / -1;
      max-width: 300px;
      margin: 0 auto;
    }

    #analytics-chart {
      max-width: 100%;
      height: auto;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 700;
      color: #667eea;
      display: block;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ─── Filters ───────────────────────────────────────────────── */
    /* Mobile: stacked */
    .filters {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .filters input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .filters input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12);
    }

    /* Mobile: 2-col button grid */
    .filter-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* Delete All spans full width on mobile */
    #delete-all-btn {
      grid-column: 1 / -1;
    }

    .filter-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .filter-btn:hover {
      filter: brightness(1.08);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    #search-btn {
      background: #667eea;
      color: #fff;
    }

    #clear-btn {
      background: #764ba2;
      color: #fff;
    }

    #delete-all-btn {
      background: #dc3545;
      color: #fff;
    }

    /* ─── History list ──────────────────────────────────────────── */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .history-item {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      transition: border-color 0.2s;
    }

    .history-item:hover {
      border-color: #667eea;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    .timestamp {
      font-size: 12px;
      color: #888;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .query-label {
      color: #667eea;
    }

    .response-label {
      color: #764ba2;
    }

    .query-text {
      background: #f5f5f5;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      color: #333;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .response-section {
      margin-top: 14px;
    }

    .response-text {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 14px;
      border-radius: 6px;
      font-size: 12.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-wrap: break-word;
      /* Mobile: shorter max-height */
      max-height: 260px;
      overflow-y: auto;
      border: 1px solid #333;
    }

    /* ─── Empty / loading states ────────────────────────────────── */
    .no-history,
    .loading {
      text-align: center;
      padding: 48px 20px;
      color: #888;
    }

    .loading {
      color: #667eea;
      font-size: 15px;
    }

    /* ─── Tablet: 768px ─────────────────────────────────────────── */
    @media (min-width: 768px) {
      body {
        padding: 24px 20px;
      }

      .container {
        padding: 32px 28px;
      }

      /* Header: side by side */
      .page-header {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }

      h1 {
        font-size: 26px;
      }

      /* Stats: 3 columns + chart */
      .stats {
        grid-template-columns: repeat(3, 1fr);
      }

      .stat-item:has(#analytics-chart) {
        grid-column: 1 / -1;
        max-width: 250px;
      }

      /* Filters: search + buttons in one row */
      .filters {
        flex-direction: row;
        align-items: center;
      }

      .filters input {
        flex: 1;
        width: auto;
      }

      .filter-btns {
        display: flex;
        gap: 8px;
        grid-template-columns: unset;
      }

      #delete-all-btn {
        grid-column: unset;
        margin-left: auto;
      }

      .response-text {
        max-height: 340px;
        font-size: 13px;
      }
    }

    /* ─── Desktop: 1024px ───────────────────────────────────────── */
    @media (min-width: 1024px) {
      body {
        padding: 40px 24px;
      }

      .container {
        padding: 40px 44px;
      }

      h1 {
        font-size: 30px;
      }

      /* Stats: 4 columns with chart on right */
      .stats {
        grid-template-columns: repeat(4, 1fr);
        padding: 16px 24px;
      }

      .stat-item:has(#analytics-chart) {
        grid-column: auto;
        max-width: 180px;
      }

      .stat-value {
        font-size: 30px;
      }

      .history-item {
        padding: 20px;
      }

      .response-text {
        max-height: 400px;
        font-size: 13.5px;
      }

      .query-text {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- ── Page header ─────────────────────────────────────────── -->
    <div class="page-header">
      <h1>Query History</h1>
      <a href="/" class="back-btn">← Back to MCP Buddy</a>
    </div>

    <!-- ── Stats ───────────────────────────────────────────────── -->
    <div class="stats">
      <div class="stat-item">
        <span class="stat-value" id="total-queries">0</span>
        <span class="stat-label">Total Queries</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="today-queries">0</span>
        <span class="stat-label">Today</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="success-rate">0%</span>
        <span class="stat-label">Success Rate</span>
      </div>
      <div class="stat-item">
        <canvas id="analytics-chart" width="120" height="120"></canvas>
      </div>
    </div>

    <!-- ── Filters ─────────────────────────────────────────────── -->
    <div class="filters">
      <input type="text" id="search-input" placeholder="Search queries…" aria-label="Search history" />
      <div class="filter-btns">
        <button id="search-btn" class="filter-btn" aria-label="Search">Search</button>
        <button id="clear-btn" class="filter-btn" aria-label="Clear search">Clear</button>
        <button id="delete-all-btn" class="filter-btn" aria-label="Delete all history">Delete All History</button>
      </div>
    </div>

    <!-- ── History list ────────────────────────────────────────── -->
    <div id="history-container">
      <div class="loading">Loading history…</div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="history.js"></script>
</body>

</html>
