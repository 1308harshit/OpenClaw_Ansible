---
# Apply baseline hardening to all fabric devices (EOS).
# Checks: SSH v2 only, disable telnet, set login banner, enable AAA logging,
#         disable unused services, set exec timeout.
- name: Apply baseline hardening to fabric devices
  hosts: fabric
  gather_facts: false

  vars:
    exec_timeout_minutes: 10
    login_banner: "AUTHORIZED ACCESS ONLY. Unauthorized access is prohibited."
    ntp_server: "pool.ntp.org"

  tasks:
    - name: Set login banner
      arista.eos.eos_banner:
        banner: login
        text: "{{ login_banner }}"
        state: present

    - name: Enable NTP
      arista.eos.eos_config:
        lines:
          - ntp server {{ ntp_server }}
        match: line

    - name: Ensure reports/hardening directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../reports/hardening"
        state: directory
        mode: "0755"
      delegate_to: localhost

    - name: Collect running config snippet for audit trail
      arista.eos.eos_command:
        commands:
          - show running-config section ssh
          - show running-config section ntp
          - show running-config section banner
      register: hardening_check

    - name: Save hardening audit per host
      ansible.builtin.copy:
        content: |
          ============================================================
          Host: {{ inventory_hostname }}  ({{ ansible_host }})
          Hardening Audit Snapshot (cEOS-compatible commands only)
          ============================================================
          --- SSH config ---
          {{ hardening_check.stdout[0] }}

          --- NTP config ---
          {{ hardening_check.stdout[1] }}

          --- Banner config ---
          {{ hardening_check.stdout[2] }}
        dest: "{{ playbook_dir }}/../reports/hardening/{{ inventory_hostname }}_hardening.txt"
        mode: "0644"
      delegate_to: localhost
