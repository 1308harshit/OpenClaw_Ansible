---
# Reverse baseline hardening on all fabric devices (EOS).
# Removes: login banner, NTP server config applied by harden_fabric_simple.yml
# Saves an audit snapshot so you can compare before/after.
# Note: ignore_errors: yes — cEOS may not support all commands but audit is always saved.
- name: Remove baseline hardening from fabric devices
  hosts: fabric
  gather_facts: false

  vars:
    ntp_server: "pool.ntp.org"

  tasks:
    - name: Remove login banner
      arista.eos.eos_banner:
        banner: login
        state: absent
      ignore_errors: yes

    - name: Remove NTP server config
      arista.eos.eos_config:
        lines:
          - no ntp server {{ ntp_server }}
        match: line
      ignore_errors: yes

    - name: Ensure reports/unhardening directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../reports/unhardening"
        state: directory
        mode: "0755"
      delegate_to: localhost

    - name: Collect running config snippet for audit trail
      arista.eos.eos_command:
        commands:
          - show running-config section ssh
          - show running-config section ntp
          - show running-config section banner
      register: unhardening_check
      ignore_errors: yes

    - name: Save unhardening audit per host
      ansible.builtin.copy:
        content: |
          ============================================================
          Host: {{ inventory_hostname }}  ({{ ansible_host }})
          Unhardening Audit Snapshot
          ============================================================
          --- SSH config (after unharden) ---
          {{ unhardening_check.stdout[0] | default('N/A') }}

          --- NTP config (after unharden) ---
          {{ unhardening_check.stdout[1] | default('N/A') }}

          --- Banner config (after unharden) ---
          {{ unhardening_check.stdout[2] | default('N/A') }}
        dest: "{{ playbook_dir }}/../reports/unhardening/{{ inventory_hostname }}_unhardening.txt"
        mode: "0644"
      delegate_to: localhost
