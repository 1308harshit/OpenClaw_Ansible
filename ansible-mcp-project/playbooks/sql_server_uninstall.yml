---
- name: Stop and uninstall PostgreSQL (localhost)
  hosts: localhost
  gather_facts: false
  become: true

  vars:
    pg_data_dir: /var/lib/pgsql/data

  tasks:
    - name: Stop PostgreSQL service if present
      ansible.builtin.service:
        name: postgresql
        state: stopped
        enabled: false
      failed_when: false
      when: not ansible_check_mode

    - name: Remove PostgreSQL packages (RHEL/AlmaLinux)
      ansible.builtin.package:
        name:
          - postgresql-server
          - postgresql
        state: absent

    - name: Remove PostgreSQL data directory
      ansible.builtin.file:
        path: "{{ pg_data_dir }}"
        state: absent


